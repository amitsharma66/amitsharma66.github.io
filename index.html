<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amit Sharma | 25+ Years Graphic Design Experience</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2C3E50;
            --secondary: #7B8A8B;
            --accent: #3498DB;
            --light: #F8F9FA;
            --dark: #2C3E50;
            --gray: #7F8C8D;
            --transition: all 0.3s ease;
            --border-radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background-color: #fafafa;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(234,238,242,0.5) 0%, transparent 55%),
                radial-gradient(circle at 85% 30%, rgba(234,238,242,0.4) 0%, transparent 55%);
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            line-height: 1.3;
        }

        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }

        .container { max-width: 1200px; margin: auto; padding: 0 20px; }
        .section { padding: 80px 0; }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--primary);
            text-align: center;
        }

        /* ✅ Button contrast improved */
        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            box-shadow: 0 6px 18px rgba(44,62,80,0.25);
        }

        .btn-primary:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: rgba(44,62,80,0.05);
            transform: translateY(-2px);
        }

        header {
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .nav-menu { display: flex; gap: 30px; }
        .nav-menu a { font-size: 15px; color: var(--gray); }
        .nav-menu a:hover { color: var(--primary); }

        .menu-toggle { display: none; background: none; border: none; font-size: 20px; }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 80px;
            background: linear-gradient(135deg, rgba(248,249,250,.9), rgba(234,238,242,.8));
        }

        .hero-content {
            max-width: 800px;
            margin: auto;
            text-align: center;
            padding: 40px 0;
        }

        .hero h1 { font-size: 3.2rem; margin-bottom: 20px; }
        .hero-subtitle { font-size: 1.4rem; color: var(--accent); margin-bottom: 25px; }
        .hero-description { font-size: 1.1rem; color: var(--gray); max-width: 700px; margin: auto; }

        .hero-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        /* ✅ Large screen hero spacing */
        @media (min-width: 1400px) {
            .hero { padding-top: 140px; padding-bottom: 120px; }
            .hero h1 { font-size: 3.6rem; }
            .hero-description { font-size: 1.15rem; max-width: 760px; }
        }

        .section h2 { font-size: 2.5rem; text-align: center; margin-bottom: 15px; }
        .section-subtitle { text-align: center; color: var(--gray); margin-bottom: 60px; max-width: 700px; margin-inline: auto; }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .portfolio-card {
            background: #fff;
            border-radius: var(--border-radius);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: var(--transition);
        }

        .portfolio-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card-image { height: 240px; background: #f5f5f5; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 25px; }
        .card-content h3 { margin-bottom: 10px; }

        .contact-section {
            background: linear-gradient(135deg, #f8f9fa, #eaeef2);
            border-top: 1px solid rgba(0,0,0,.05);
        }

        .contact-card {
            background: #fff;
            padding: 60px;
            border-radius: var(--border-radius);
            max-width: 800px;
            margin: auto;
            border: 1px solid rgba(0,0,0,.05);
        }

        footer {
            background: var(--primary);
            color: #fff;
            text-align: center;
            padding: 50px 0 30px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            border-radius: var(--border-radius);
            max-width: 500px;
            width: 100%;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            border: none;
            cursor: pointer;
        }

        .modal-body { padding: 40px; text-align: center; }
    </style>
</head>

<body>

<header>
    <div class="container nav-wrapper">
        <a class="logo">Amit Sharma</a>
        <nav>
            <ul class="nav-menu">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#work">Portfolio</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        </nav>
    </div>
</header>

<section id="home" class="hero">
    <div class="container hero-content">
        <h1>Crafting Iconic Brands Since 1998</h1>
        <p class="hero-subtitle">25+ Years of Visual Design Excellence</p>
        <p class="hero-description">
            I transform business visions into compelling visual identities that resonate, engage, and drive results.
        </p>
        <div class="hero-buttons">
            <a href="#work" class="btn btn-primary">View Portfolio</a>
            <a href="#contact" class="btn btn-secondary">Start Your Project</a>
        </div>
    </div>
</section>

<script>
function openContactModal() {
    document.getElementById('contactModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
function closeModal() {
    document.getElementById('contactModal').style.display = 'none';
    document.body.style.overflow = 'auto';
}
</script>

</body>
</html>
